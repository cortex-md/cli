name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Release CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Validate required secrets
        env:
          CLI_GITHUB_CLIENT_ID: ${{ secrets.CLI_GITHUB_CLIENT_ID }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$CLI_GITHUB_CLIENT_ID" ]; then
            echo "Missing required secret: CLI_GITHUB_CLIENT_ID"
            echo "Create an OAuth App and set this secret to the app Client ID"
            exit 1
          fi
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing required secret: NPM_TOKEN"
            exit 1
          fi

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_CLIENT_ID: ${{ secrets.CLI_GITHUB_CLIENT_ID }}
        run: |
          VERSION_VALUE="${VERSION#v}"
          make release VERSION="$VERSION_VALUE" GITHUB_CLIENT_ID="$GITHUB_CLIENT_ID"

      - name: Create archives
        run: |
          mkdir -p dist
          tar -czf dist/cortex-${{ github.ref_name }}-darwin-arm64.tar.gz -C bin cortex-darwin-arm64
          tar -czf dist/cortex-${{ github.ref_name }}-darwin-amd64.tar.gz -C bin cortex-darwin-amd64
          tar -czf dist/cortex-${{ github.ref_name }}-linux-amd64.tar.gz -C bin cortex-linux-amd64
          tar -czf dist/cortex-${{ github.ref_name }}-linux-arm64.tar.gz -C bin cortex-linux-arm64
          cp bin/cortex-windows-amd64.exe dist/cortex-${{ github.ref_name }}-windows-amd64.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cortex CLI ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Automatic CLI release for `${{ github.ref_name }}`.

            This release includes platform binaries and npm packages.
          draft: false
          prerelease: false
          files: |
            dist/cortex-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/cortex-${{ github.ref_name }}-darwin-amd64.tar.gz
            dist/cortex-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/cortex-${{ github.ref_name }}-linux-arm64.tar.gz
            dist/cortex-${{ github.ref_name }}-windows-amd64.exe

      - name: Prepare npm packages
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          rm -rf npm
          mkdir -p npm

          mkdir -p npm/cli-darwin-arm64/bin
          cp bin/cortex-darwin-arm64 npm/cli-darwin-arm64/bin/cortex
          chmod +x npm/cli-darwin-arm64/bin/cortex
          cat > npm/cli-darwin-arm64/package.json <<EOF
          {
            "name": "@cortex.md/cli-darwin-arm64",
            "version": "${VERSION}",
            "description": "Cortex CLI binary for macOS arm64",
            "license": "MIT",
            "os": ["darwin"],
            "cpu": ["arm64"],
            "bin": {
              "cortex": "bin/cortex"
            },
            "files": ["bin"]
          }
          EOF

          mkdir -p npm/cli-darwin-x64/bin
          cp bin/cortex-darwin-amd64 npm/cli-darwin-x64/bin/cortex
          chmod +x npm/cli-darwin-x64/bin/cortex
          cat > npm/cli-darwin-x64/package.json <<EOF
          {
            "name": "@cortex.md/cli-darwin-x64",
            "version": "${VERSION}",
            "description": "Cortex CLI binary for macOS x64",
            "license": "MIT",
            "os": ["darwin"],
            "cpu": ["x64"],
            "bin": {
              "cortex": "bin/cortex"
            },
            "files": ["bin"]
          }
          EOF

          mkdir -p npm/cli-linux-arm64/bin
          cp bin/cortex-linux-arm64 npm/cli-linux-arm64/bin/cortex
          chmod +x npm/cli-linux-arm64/bin/cortex
          cat > npm/cli-linux-arm64/package.json <<EOF
          {
            "name": "@cortex.md/cli-linux-arm64",
            "version": "${VERSION}",
            "description": "Cortex CLI binary for Linux arm64",
            "license": "MIT",
            "os": ["linux"],
            "cpu": ["arm64"],
            "bin": {
              "cortex": "bin/cortex"
            },
            "files": ["bin"]
          }
          EOF

          mkdir -p npm/cli-linux-x64/bin
          cp bin/cortex-linux-amd64 npm/cli-linux-x64/bin/cortex
          chmod +x npm/cli-linux-x64/bin/cortex
          cat > npm/cli-linux-x64/package.json <<EOF
          {
            "name": "@cortex.md/cli-linux-x64",
            "version": "${VERSION}",
            "description": "Cortex CLI binary for Linux x64",
            "license": "MIT",
            "os": ["linux"],
            "cpu": ["x64"],
            "bin": {
              "cortex": "bin/cortex"
            },
            "files": ["bin"]
          }
          EOF

          mkdir -p npm/cli-win32-x64/bin
          cp bin/cortex-windows-amd64.exe npm/cli-win32-x64/bin/cortex.exe
          cat > npm/cli-win32-x64/package.json <<EOF
          {
            "name": "@cortex.md/cli-win32-x64",
            "version": "${VERSION}",
            "description": "Cortex CLI binary for Windows x64",
            "license": "MIT",
            "os": ["win32"],
            "cpu": ["x64"],
            "bin": {
              "cortex": "bin/cortex.exe"
            },
            "files": ["bin"]
          }
          EOF

          mkdir -p npm/cli/bin
          cat > npm/cli/package.json <<EOF
          {
            "name": "@cortex.md/cli",
            "version": "${VERSION}",
            "description": "Official Cortex CLI",
            "license": "MIT",
            "bin": {
              "cortex": "bin/cortex.js"
            },
            "files": ["bin", "postinstall.js"],
            "scripts": {
              "postinstall": "node postinstall.js"
            },
            "optionalDependencies": {
              "@cortex.md/cli-darwin-arm64": "${VERSION}",
              "@cortex.md/cli-darwin-x64": "${VERSION}",
              "@cortex.md/cli-linux-arm64": "${VERSION}",
              "@cortex.md/cli-linux-x64": "${VERSION}",
              "@cortex.md/cli-win32-x64": "${VERSION}"
            }
          }
          EOF

          cat > npm/cli/postinstall.js <<'EOF'
          const fs = require("node:fs")
          const path = require("node:path")

          const mapping = {
            "darwin-arm64": "@cortex.md/cli-darwin-arm64",
            "darwin-x64": "@cortex.md/cli-darwin-x64",
            "linux-arm64": "@cortex.md/cli-linux-arm64",
            "linux-x64": "@cortex.md/cli-linux-x64",
            "win32-x64": "@cortex.md/cli-win32-x64"
          }

          const key = `${process.platform}-${process.arch}`
          const targetPackage = mapping[key]
          if (!targetPackage) {
            process.exit(0)
          }

          const packagePath = path.dirname(require.resolve(`${targetPackage}/package.json`))
          const sourceBinary = process.platform === "win32"
            ? path.join(packagePath, "bin", "cortex.exe")
            : path.join(packagePath, "bin", "cortex")

          const targetDir = path.join(__dirname, "bin")
          fs.mkdirSync(targetDir, { recursive: true })

          const targetBinary = process.platform === "win32"
            ? path.join(targetDir, "cortex.exe")
            : path.join(targetDir, "cortex")

          fs.copyFileSync(sourceBinary, targetBinary)
          if (process.platform !== "win32") {
            fs.chmodSync(targetBinary, 0o755)
          }
          EOF

          cat > npm/cli/bin/cortex.js <<'EOF'
          #!/usr/bin/env node
          const { spawnSync } = require("node:child_process")
          const path = require("node:path")

          const executable = process.platform === "win32"
            ? path.join(__dirname, "cortex.exe")
            : path.join(__dirname, "cortex")

          const result = spawnSync(executable, process.argv.slice(2), { stdio: "inherit" })
          if (result.error) {
            console.error(result.error.message)
            process.exit(1)
          }
          process.exit(result.status ?? 0)
          EOF
          chmod +x npm/cli/bin/cortex.js

      - name: Publish @cortex.md/cli-darwin-arm64
        working-directory: npm/cli-darwin-arm64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cortex.md/cli-darwin-x64
        working-directory: npm/cli-darwin-x64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cortex.md/cli-linux-arm64
        working-directory: npm/cli-linux-arm64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cortex.md/cli-linux-x64
        working-directory: npm/cli-linux-x64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cortex.md/cli-win32-x64
        working-directory: npm/cli-win32-x64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cortex.md/cli
        working-directory: npm/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
